name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: macos_apple_silicon

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          APP_NAME: mailfrost
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -eu
          mkdir -p dist
          out_dir="${APP_NAME}_${VERSION}_${ASSET_NAME}"
          bin_name="${APP_NAME}"
          mkdir -p "${out_dir}"
          cat > "${out_dir}/README.txt" <<'EOF'
          Mailfrost

          1. Unzip this archive.
          2. Make the binary executable:
             chmod +x mailfrost

          On macOS, if the binary is blocked because it is unsigned, run:
             xattr -d com.apple.quarantine ./mailfrost
          EOF
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${out_dir}/${bin_name}" ./cmd/mailfrost
          (cd "${out_dir}" && zip -q "../dist/${out_dir}.zip" "${bin_name}" README.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip

  update_formula:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Update Formula/mailfrost.rb
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          release_json="$(gh api "repos/${REPO}/releases/tags/${TAG_NAME}")"
          asset_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | endswith("_macos_apple_silicon.zip")) | .browser_download_url')"
          asset_digest="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | endswith("_macos_apple_silicon.zip")) | .digest')"
          if [ -z "${asset_url}" ] || [ "${asset_url}" = "null" ]; then
            echo "macOS Apple Silicon asset not found in release ${TAG_NAME}" >&2
            exit 1
          fi
          if [ -z "${asset_digest}" ] || [ "${asset_digest}" = "null" ]; then
            echo "sha256 digest missing for release asset ${TAG_NAME}" >&2
            exit 1
          fi
          asset_sha256="${asset_digest#sha256:}"
          version="${TAG_NAME#v}"
          python3 - <<'PY' "${TAG_NAME}" "${version}" "${asset_url}" "${asset_sha256}"
from pathlib import Path
import re
import sys

tag_name, version, asset_url, asset_sha256 = sys.argv[1:]
path = Path("Formula/mailfrost.rb")
text = path.read_text()
text = re.sub(r'^  url ".*"$', f'  url "{asset_url}"', text, flags=re.M)
text = re.sub(r'^  sha256 ".*"$', f'  sha256 "{asset_sha256}"', text, flags=re.M)
text = re.sub(r'^  version ".*"$', f'  version "{version}"', text, flags=re.M)
path.write_text(text)
PY

      - name: Commit formula update
        run: |
          set -eu
          if git diff --quiet -- Formula/mailfrost.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mailfrost.rb
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
