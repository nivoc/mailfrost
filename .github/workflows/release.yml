name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: macos_apple_silicon

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          APP_NAME: mailfrost
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -eu
          mkdir -p dist
          out_dir="${APP_NAME}_${VERSION}_${ASSET_NAME}"
          bin_name="${APP_NAME}"
          mkdir -p "${out_dir}"
          cat > "${out_dir}/README.txt" <<'EOF'
          Mailfrost

          1. Unzip this archive.
          2. Make the binary executable:
             chmod +x mailfrost

          On macOS, if the binary is blocked because it is unsigned, run:
             xattr -d com.apple.quarantine ./mailfrost
          EOF
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${out_dir}/${bin_name}" ./cmd/mailfrost
          (cd "${out_dir}" && zip -q "../dist/${out_dir}.zip" "${bin_name}" README.txt)

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -eu
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/*.zip --clobber
          else
            gh release create "${TAG_NAME}" dist/*.zip --verify-tag --title "${TAG_NAME}"
          fi

  update_formula:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v5
        with:
          repository: nivoc/homebrew-tap
          ref: main
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Formula/mailfrost.rb in tap repo
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          release_json="$(gh api "repos/${REPO}/releases/tags/${TAG_NAME}")"
          asset_url="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | endswith("_macos_apple_silicon.zip")) | .browser_download_url')"
          asset_digest="$(printf '%s' "${release_json}" | jq -r '.assets[] | select(.name | endswith("_macos_apple_silicon.zip")) | .digest')"
          if [ -z "${asset_url}" ] || [ "${asset_url}" = "null" ]; then
            echo "macOS Apple Silicon asset not found in release ${TAG_NAME}" >&2
            exit 1
          fi
          if [ -z "${asset_digest}" ] || [ "${asset_digest}" = "null" ]; then
            echo "sha256 digest missing for release asset ${TAG_NAME}" >&2
            exit 1
          fi
          asset_sha256="${asset_digest#sha256:}"
          version="${TAG_NAME#v}"
          mkdir -p Formula
          cat > Formula/mailfrost.rb <<EOF
          class Mailfrost < Formula
            desc "Maildir integrity tracking, confidence, and backup"
            homepage "https://github.com/nivoc/mailfrost"
            url "${asset_url}"
            sha256 "${asset_sha256}"
            version "${version}"

            depends_on arch: :arm64

            def install
              odie "Mailfrost is currently packaged only for macOS Apple Silicon." unless OS.mac? && Hardware::CPU.arm?

              bin.install "mailfrost"
              prefix.install "README.txt"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mailfrost version")
            end
          end
          EOF

      - name: Commit formula update
        run: |
          set -eu
          if git diff --quiet -- Formula/mailfrost.rb; then
            echo "Formula already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mailfrost.rb
          git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
