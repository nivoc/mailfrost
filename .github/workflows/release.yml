name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: linux_x86_64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: linux_arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: macos_apple_silicon

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
          APP_NAME: mailfrost
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -eu
          mkdir -p dist
          out_dir="${APP_NAME}_${VERSION}_${ASSET_NAME}"
          bin_name="${APP_NAME}"
          mkdir -p "${out_dir}"
          cat > "${out_dir}/README.txt" <<'EOF'
          Mailfrost

          1. Unzip this archive.
          2. Make the binary executable:
             chmod +x mailfrost

          On macOS, if the binary is blocked because it is unsigned, run:
             xattr -d com.apple.quarantine ./mailfrost
          EOF
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "${out_dir}/${bin_name}" ./cmd/mailfrost
          (cd "${out_dir}" && zip -q "../dist/${out_dir}.zip" "${bin_name}" README.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
